services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: rhe-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rhe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Express API — hot reload with nodemon) ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: rhe-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app            # mount source for hot reload
      - /app/node_modules         # keep container's node_modules isolated
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/rabbit-hole-explorer
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (Next.js — hot reload with next dev) ──────────────────────────
  frontend:
    build:
      context: .                      # root context so Dockerfile can copy root package.json
      dockerfile: frontend/Dockerfile.dev
    container_name: rhe-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend      # mount source for hot reload
      - /app/frontend/node_modules    # keep container's node_modules isolated
      - /app/frontend/.next           # keep Next.js build cache isolated
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      WATCHPACK_POLLING: "true"   # needed for hot reload inside Docker on some OSes
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data: